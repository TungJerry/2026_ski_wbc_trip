    <!-- 4. 錯誤攔截器 -->
    <script>
        window.onerror = function(msg, url, line, col, error) {
            var debugDiv = document.getElementById('debug-console');
            if (!debugDiv) {
                debugDiv = document.createElement('div');
                debugDiv.id = 'debug-console';
                debugDiv.style.cssText = 'position:fixed;top:0;left:0;width:100%;background:red;color:white;padding:20px;z-index:9999;font-size:14px;white-space:pre-wrap;';
                document.body.appendChild(debugDiv);
            }
            debugDiv.innerHTML += '🔴 Error: ' + msg + '\nLine: ' + line + '\n\n';
            return false;
        };
    </script>

                                    <div className="flex justify-between items-start">
                                        <span className="text-sm font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded mb-1 inline-block">{event.time}</span>
                                        {event.tag && <span className="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded">{event.tag}</span>}
                                    </div>
                                    <div className="flex items-center gap-2 mb-1">
                                        <h4 className="font-bold text-gray-800 text-lg leading-tight">{event.title}</h4>
                                        {EventIcon && <span className="text-gray-400"><EventIcon /></span>}
                                    </div>
                                    
                                    {/* 渲染單一連結 (向下相容) */}
                                    {event.link && (
                                        <div className="mb-2">
                                            <a href={event.link} target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-1.5 text-xs text-blue-600 bg-blue-50 px-2.5 py-1.5 rounded-md border border-blue-100 font-bold active:bg-blue-100 transition-colors">
                                                📍 打開 Google Maps
                                            </a>
                                        </div>
                                    )}

                                    {/* 渲染多個連結 */}
                                    {event.links && (
                                        <div className="mb-2 flex flex-wrap gap-2">
                                            {event.links.map((lnk, i) => (
                                                <a key={i} href={lnk.url} target="_blank" rel="noopener noreferrer" onClick={(e) => e.stopPropagation()} className="inline-flex items-center gap-1.5 text-xs text-blue-600 bg-blue-50 px-2.5 py-1.5 rounded-md border border-blue-100 font-bold active:bg-blue-100 transition-colors">
                                                    📍 {lnk.name}
                                                </a>
                                            ))}
                                        </div>
                                    )}

                                    {event.isSplit ? (
                                        <div className="mt-3 grid grid-cols-1 gap-2">
                                            <div className="bg-red-50 p-3 rounded-lg border border-red-100">
                                                <div className="text-xs text-red-600 font-bold mb-1">Group A</div>
                                                <div className="font-semibold text-sm">{event.groupA.title}</div>
                                                <div className="text-sm text-gray-600">{event.groupA.desc}</div>
                                            </div>
                                            <div className="bg-indigo-50 p-3 rounded-lg border border-indigo-100">
                                                <div className="text-xs text-indigo-600 font-bold mb-1">Group B</div>
                                                <div className="font-semibold text-sm">{event.groupB.title}</div>
                                                <div className="text-sm text-gray-600">{event.groupB.desc}</div>
                                            </div>
                                        </div>
                                    ) : (
                                        <p className="text-gray-600 text-sm whitespace-pre-line leading-relaxed">{event.desc}</p>
                                    )}
                                    {event.isWarning && (
                                        <div className="mt-2 flex items-center gap-2 text-amber-600 text-sm bg-amber-50 p-2 rounded">
                                            <Icons.AlertCircle /> <span className="font-medium">重要提醒</span>
                                        </div>
                                    )}
                                </div>
                            )})}
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('schedule');
            const [openDay, setOpenDay] = useState(2); // 預設展開 3/1 確認修改

            return (
                <div className="max-w-md mx-auto min-h-screen bg-gray-50 pb-24 font-sans text-gray-900">
                    <div className="bg-white p-5 sticky top-0 z-10 shadow-sm border-b border-gray-100">
                        <div className="flex justify-between items-center mb-1">
                            <h1 className="text-xl font-bold text-gray-900 tracking-tight">東京 WBC + 滑雪之旅</h1>
                            <span className="text-xs font-mono bg-gray-100 px-2 py-1 rounded">V2</span>
                        </div>
                        <div className="flex items-center gap-2 text-sm text-gray-500">
                            <Icons.Users /> <span>{members.length} 人：{members.join(", ")}</span>
                        </div>
                    </div>

                    <div className="p-4">
                        {activeTab === 'schedule' && (
                            <>
                                <Countdown />
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="font-bold text-gray-700 flex items-center gap-2">
                                        <Icons.Calendar /> 詳細行程
                                    </h2>
                                    <button onClick={() => setOpenDay(openDay === null ? 0 : null)} className="text-xs text-blue-600 font-medium">{openDay === null ? "展開第一天" : "收合全部"}</button>
                                </div>
                                <div className="space-y-4">
                                    {itineraryData.map((day, idx) => (
                                        <DayCard 
                                            key={idx} 
                                            data={day} 
                                            isOpen={openDay === idx} 
                                            onToggle={() => setOpenDay(openDay === idx ? null : idx)}
                                        />
                                    ))}
                                </div>
                            </>
                        )}
                        {activeTab === 'info' && (
                            <div className="space-y-6">
                                <section>
                                    <h2 className="font-bold text-gray-800 mb-3 flex items-center gap-2"><Icons.Plane /> 航班資訊</h2>
                                    {flights.map((f, i) => <FlightCard key={i} data={f} />)}
                                </section>
                                <section>
                                    <h2 className="font-bold text-gray-800 mb-3 flex items-center gap-2"><Icons.Home /> 住宿資訊</h2>
                                    {accommodations.map((h, i) => (
                                        <div key={i} className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 mb-3">
                                            <div className="flex justify-between items-start">
                                                <div>
                                                    <div className="font-bold text-gray-800">{h.name}</div>
                                                    <div className="text-sm text-gray-500 flex items-center gap-1 mt-1"><Icons.MapPin /> {h.location}</div>
                                                </div>
                                                <div className="bg-orange-100 text-orange-700 text-xs font-bold px-2 py-1 rounded">{h.date}</div>
                                            </div>
                                            {h.note && <div className="mt-2 text-xs text-gray-400 border-t border-gray-100 pt-2">{h.note}</div>}
                                        </div>
                                    ))}
                                </section>
                                <section>
                                    <h2 className="font-bold text-gray-800 mb-3 flex items-center gap-2"><Icons.CheckSquare /> 決策與待辦</h2>
                                    <div className="bg-red-50 p-4 rounded-xl border border-red-100">
                                        <ul className="space-y-4 text-sm text-red-800">
                                            {/* Booking Tasks */}
                                            <li className="flex items-start gap-2 border-b border-red-100 pb-2">
                                                <input type="checkbox" className="mt-1 w-4 h-4 rounded border-gray-300 text-red-600 focus:ring-red-500" /> 
                                                <span><strong>出發前必做:</strong><br/>1. 填寫 VJW (Visit Japan Web)<br/>2. 買好 Skyliner 車票</span>
                                            </li>
                                            <li className="flex items-start gap-2 border-b border-red-100 pb-2">
                                                <input type="checkbox" className="mt-1 w-4 h-4 rounded border-gray-300 text-red-600 focus:ring-red-500" /> 
                                                <span><strong>預訂交通:</strong><br/>1. 新幹線 Toki 323 (去程)<br/>2. 新幹線 Toki 318 (回程)<br/>3. 苗場接駁車 (2/28去, 3/4回)</span>
                                            </li>
                                            
                                            {/* Decision Tasks */}
                                            <li className="flex items-start gap-2">
                                                <input type="checkbox" className="mt-1 w-4 h-4 rounded border-gray-300 text-red-600 focus:ring-red-500" /> 
                                                <span><strong>3/4 澀谷決策:</strong><br/>晚餐吃什麼?</span>
                                            </li>
                                            <li className="flex items-start gap-2">
                                                <input type="checkbox" className="mt-1 w-4 h-4 rounded border-gray-300 text-red-600 focus:ring-red-500" /> 
                                                <span><strong>3/6 行程決策:</strong><br/>下午去晴空塔WBC店嗎?</span>
                                            </li>
                                            <li className="flex items-start gap-2">
                                                <input type="checkbox" className="mt-1 w-4 h-4 rounded border-gray-300 text-red-600 focus:ring-red-500" /> 
                                                <span><strong>3/7 行程決策:</strong><br/>下午逛完御茶之水要幹嘛?</span>
                                            </li>
                                        </ul>
                                    </div>
                                </section>
                            </div>
                        )}
                    </div>

                    <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 px-6 py-3 flex justify-around items-center z-50 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                        <button onClick={() => setActiveTab('schedule')} className={`flex flex-col items-center gap-1 transition-colors ${activeTab === 'schedule' ? 'text-blue-600' : 'text-gray-400'}`}>
                            <Icons.Calendar /> <span className="text-[10px] font-medium">行程</span>
                        </button>
                        <div className="w-px h-8 bg-gray-100"></div>
                        <button onClick={() => setActiveTab('info')} className={`flex flex-col items-center gap-1 transition-colors ${activeTab === 'info' ? 'text-blue-600' : 'text-gray-400'}`}>
                            <Icons.Ticket /> <span className="text-[10px] font-medium">資訊</span>
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
